services:
  - type: web
    name: quorum
    runtime: node
    plan: free
    buildCommand: corepack enable && yarn install --frozen-lockfile --production=false && yarn nx run-many -t build -p quorum-api quorum-web
    startCommand: node dist/apps/quorum-api/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      # Optional: enables "Sign in with Google". Leave unset to run without it.
      - key: GOOGLE_CLIENT_ID
        sync: false
