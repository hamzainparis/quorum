<div class="qrm-lobby">
  <div class="qrm-lobby__blob qrm-lobby__blob--a"></div>
  <div class="qrm-lobby__blob qrm-lobby__blob--b"></div>

  <div class="qrm-lobby__card">
    <div class="qrm-lobby__brand">
      <div class="qrm-lobby__mark">
        <div class="qrm-lobby__mark-chip"></div>
      </div>
      <div>
        <div class="qrm-lobby__brand-name">Quorum</div>
        <div class="qrm-lobby__brand-tag">SPRINT POKER · LIVE</div>
      </div>
    </div>

    <h1 class="qrm-lobby__title">Join the planning room</h1>
    <p class="qrm-lobby__subtitle">No account needed — drop your name and start estimating with the team.</p>

    <button
      type="button"
      class="qrm-lobby__google-btn"
      [disabled]="googlePending()"
      (click)="googleSignIn()"
    >
      <svg width="19" height="19" viewBox="0 0 48 48">
        <path
          fill="#FFC107"
          d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"
        />
        <path
          fill="#FF3D00"
          d="M6.3 14.7l6.6 4.8C14.7 16 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"
        />
        <path
          fill="#4CAF50"
          d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.1-11.3-7.5l-6.5 5C9.5 39.6 16.2 44 24 44z"
        />
        <path
          fill="#1976D2"
          d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.6l6.2 5.2C39.8 36.5 44 31 44 24c0-1.3-.1-2.3-.4-3.5z"
        />
      </svg>
      {{ googlePending() ? 'Connecting…' : 'Continue with Google' }}
    </button>

    @if (errorMessage()) {
      <p class="qrm-lobby__error">{{ errorMessage() }}</p>
    }

    <div class="qrm-lobby__divider">
      <span class="qrm-lobby__divider-line"></span>
      <span class="qrm-lobby__divider-label">OR</span>
      <span class="qrm-lobby__divider-line"></span>
    </div>

    <label class="qrm-lobby__label" for="qrm-lobby-name">Your display name</label>
    <input
      id="qrm-lobby-name"
      class="qrm-lobby__input"
      [value]="nameDraft()"
      (input)="onNameInput($event)"
      (keydown)="onNameKey($event)"
      placeholder="e.g. Jordan Lee"
    />

    <button type="button" class="qrm-lobby__submit" (click)="join()">Enter room →</button>

    <div class="qrm-lobby__meta">
      <span class="qrm-lobby__meta-item">
        <span class="qrm-lobby__meta-dot"></span>
        Room {{ roomCode() }}
      </span>
    </div>
  </div>
</div>
